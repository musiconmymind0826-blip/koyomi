<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0a0d">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; media-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'">
<meta name="referrer" content="no-referrer">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="こよみ">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.webmanifest">
<title>こよみ 七十二候</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --gold:#d9b667; --gold2:#e8cd85; --gold3:#f0d98a;
    --paper:#f3efe6; --ink:#08080a; --shu:#a8281e;
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  html,body { height:100%; background:var(--ink); overflow:hidden; overscroll-behavior:none; }
  body { font-family:"Hiragino Mincho ProN","Shippori Mincho B1","Yu Mincho","Noto Serif JP",serif;
    color:var(--paper); user-select:none; -webkit-user-select:none; touch-action:pan-y;
    -webkit-font-smoothing:antialiased; }
  #stage { position:fixed; inset:0; }
  #season-bg { position:absolute; inset:0; background-size:cover; background-position:center; }
  #season-tint { position:absolute; inset:0;
    background:
      radial-gradient(ellipse 70% 50% at 28% 38%, rgba(8,8,12,.15) 0%, rgba(8,8,12,.42) 100%),
      linear-gradient(180deg, rgba(8,8,12,.25) 0%, transparent 35%, rgba(8,8,12,.55) 100%); }
  /* 昼：題字側だけ軽く陰、空は明るく保つ */
  body.is-day #season-tint {
    background:
      radial-gradient(ellipse 60% 45% at 24% 40%, rgba(8,8,12,.28) 0%, transparent 70%),
      linear-gradient(180deg, transparent 0%, transparent 45%, rgba(20,16,30,.4) 100%); }
  /* 夜：より沈める */
  body.is-night #season-tint {
    background:
      radial-gradient(ellipse 70% 50% at 28% 38%, rgba(8,8,12,.2) 0%, rgba(8,8,12,.5) 100%),
      linear-gradient(180deg, rgba(8,8,12,.35) 0%, transparent 35%, rgba(8,8,12,.62) 100%); }
  body.is-day #title .kanji { text-shadow:0 4px 30px rgba(0,0,0,.85), 0 0 18px rgba(0,0,0,.5); }
  body.is-day #title-en, body.is-day #meta { text-shadow:0 2px 12px rgba(0,0,0,.9); }
  #scene { position:absolute; inset:0; width:100%; height:100%; opacity:.9; }
  #ui { position:absolute; inset:0; }
  #goldframe { position:absolute; inset:0; pointer-events:none; z-index:4; opacity:.5; }
  .v { writing-mode:vertical-rl; text-orientation:upright; }

  /* 大きな当たり判定（左右送り・中央タップで詳細）*/
  #tap-detail { position:absolute; inset:0; z-index:2; }

  /* 候番号（極小・右上・縦）*/
  #ordinal { position:absolute; top:max(24px,env(safe-area-inset-top)); right:22px; z-index:6;
    text-align:right; }
  #ordinal .cur { display:block; color:rgba(217,182,103,.78); font-size:13px; letter-spacing:3px;
    text-shadow:0 1px 6px rgba(0,0,0,.7); }
  #ordinal .today { display:inline-block; margin-top:7px; color:var(--shu); font-size:10px; letter-spacing:1px;
    border:0.5px solid rgba(168,40,30,.55); padding:3px 7px; border-radius:3px; }

  /* 主役：題字 */
  #title { position:absolute; top:21%; left:32px; z-index:6; display:flex; align-items:flex-start; }
  #title .kanji { font-size:clamp(46px,18vw,76px); color:var(--gold3); font-weight:600; line-height:1.08;
    text-shadow:0 4px 28px rgba(0,0,0,.7), 0 0 22px rgba(217,182,103,.18); }
  #title .ruby { margin-left:9px; padding-top:8px; }
  #title .ruby span { font-size:12px; color:rgba(217,182,103,.85); display:block; line-height:1.5;
    text-align:center; text-shadow:0 1px 5px rgba(0,0,0,.6); }
  #title-en { position:absolute; top:21%; left:34px; margin-top:-26px; z-index:6;
    font-size:11px; letter-spacing:2.5px; color:rgba(240,217,138,.78); max-width:200px;
    line-height:1.4; font-style:italic; text-shadow:0 1px 8px rgba(0,0,0,.7);
    text-transform:uppercase; }

  /* 季節と日付（一行・控えめ・下部）*/
  #meta { position:absolute; left:34px; bottom:128px; z-index:6;
    font-size:12px; letter-spacing:2px; color:rgba(243,239,230,.7); line-height:1.8;
    text-shadow:0 1px 8px rgba(0,0,0,.7); }
  #meta .m-sekki { color:var(--gold); }
  #meta .m-en { color:rgba(240,217,138,.55); font-size:10px; font-style:italic; }

  /* 詳細を促す微かなしるし */
  #more-hint { position:absolute; left:34px; bottom:104px; z-index:6;
    font-size:10px; letter-spacing:3px; color:rgba(217,182,103,.62);
    animation:breathe 4s var(--ease) infinite; }
  @keyframes breathe { 0%,100%{opacity:.45} 50%{opacity:.85} }

  /* フッター：進行と最小操作 */
  #footer { position:absolute; left:0; right:0; bottom:0; z-index:7;
    padding:0 24px calc(26px + env(safe-area-inset-bottom)); }
  #track { height:1px; background:rgba(243,239,230,.12); position:relative; }
  #fill { height:1px; background:linear-gradient(90deg,var(--gold),var(--gold3));
    box-shadow:0 0 8px rgba(217,182,103,.5); transition:width .8s var(--ease); }
  #dots { display:flex; justify-content:center; gap:5px; margin-top:14px; }
  #dots .dot { width:4px; height:4px; border-radius:50%; background:rgba(243,239,230,.2);
    transition:all .4s var(--ease); }
  #dots .dot.on { background:var(--gold2); width:5px; height:5px; box-shadow:0 0 6px rgba(217,182,103,.6); }
  #controls { position:absolute; right:20px; bottom:calc(20px + env(safe-area-inset-bottom));
    display:flex; gap:6px; }
  .ic { width:42px; height:42px; border-radius:50%; border:0.5px solid rgba(217,182,103,.35);
    background:rgba(8,8,12,.45); color:var(--gold); font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px); transition:all .3s var(--ease); }
  .ic:active { transform:scale(.92); background:rgba(217,182,103,.16); }
  .ic.off { color:rgba(243,239,230,.35); }

  /* 入場アニメ（上質に）*/
  .fade { opacity:0; transform:translateY(16px); transition:opacity 1.1s var(--ease), transform 1.1s var(--ease); }
  .fade.in { opacity:1; transform:none; }

  /* ===== 栞（詳細シート）===== */
  #shiori, #menu, #calendar { position:absolute; inset:0; z-index:100; display:none;
    align-items:flex-end; justify-content:center;
    background:rgba(5,5,8,.55); -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); }
  #shiori.on, #menu.on, #calendar.on { display:flex; }
  #sheet, #menu-sheet, #cal-sheet { position:relative; width:100%; max-width:600px;
    background:linear-gradient(180deg, rgba(14,14,18,.98), rgba(10,10,13,.99));
    border-top:0.5px solid rgba(217,182,103,.4);
    border-radius:20px 20px 0 0; padding:28px 26px calc(30px + env(safe-area-inset-bottom));
    box-shadow:0 -10px 50px rgba(0,0,0,.6);
    animation:sheetUp .5s var(--ease); max-height:90vh; overflow-y:auto; }
  @keyframes sheetUp { from{transform:translateY(100%)} to{transform:none} }
  #sheet::before, #cal-sheet::before { content:''; position:absolute; top:10px; left:50%;
    transform:translateX(-50%); width:36px; height:4px; border-radius:2px; background:rgba(217,182,103,.3); }
  #sh-head { text-align:center; font-size:22px; color:var(--gold2); letter-spacing:6px; margin-top:10px; }
  #sh-head .sh-en { display:block; font-size:11px; letter-spacing:2px; color:rgba(240,217,138,.7);
    font-style:italic; margin-top:8px; text-transform:uppercase; }
  #sh-rule { height:8px; margin:18px auto; width:50%; }
  #cols { display:flex; flex-direction:row; justify-content:center; gap:10px; padding-top:8px; }
  .sh-item { flex:1; max-width:110px; text-align:center; padding:14px 8px;
    border:0.5px solid rgba(217,182,103,.18); border-radius:12px; background:rgba(217,182,103,.03); }
  .si-label { font-size:11px; color:rgba(217,182,103,.95); letter-spacing:1px; margin-bottom:10px; }
  .si-label span { display:block; font-size:8px; color:rgba(240,217,138,.55); font-style:italic; margin-top:3px; }
  .si-body { font-size:14px; color:var(--paper); line-height:1.5; }
  .si-en { font-size:8.5px; color:rgba(240,217,138,.55); font-style:italic; margin-top:6px; line-height:1.3; }
  .sh-term { margin-top:24px; padding:16px 18px; border-radius:12px; background:rgba(217,182,103,.04);
    border-left:2px solid rgba(217,182,103,.4); text-align:left; }
  .st-name { font-size:14px; color:var(--gold2); letter-spacing:2px; margin-bottom:8px; }
  .st-name span { font-size:11px; color:rgba(217,182,103,.7); }
  .st-body { font-size:12.5px; color:rgba(243,239,230,.85); line-height:1.8; }
  .st-en { font-size:9px; color:rgba(240,217,138,.5); font-style:italic; margin-top:8px; }
  .wk-wrap { margin-top:24px; padding-top:22px; border-top:0.5px solid rgba(217,182,103,.18); text-align:center; }
  #sh-waka { margin-top:24px; padding-top:20px; border-top:0.5px solid rgba(217,182,103,.18);
    text-align:center; }
  .wk-poem { font-size:15px; line-height:2.1; color:var(--gold3); letter-spacing:2px; }
  .wk-author { font-size:11px; color:rgba(217,182,103,.7); margin-top:12px; letter-spacing:1px; }
  .wk-im { font-size:12px; color:rgba(243,239,230,.65); margin-top:14px; line-height:1.7; }
  .wk-en { font-size:10px; color:rgba(240,217,138,.55); margin-top:8px; font-style:italic; line-height:1.5; }
  #sh-actions { display:flex; gap:12px; margin-top:26px; }
  .sh-btn { flex:1; border:0.5px solid rgba(217,182,103,.5); background:rgba(217,182,103,.04);
    color:var(--gold); font-family:inherit; font-size:13px; letter-spacing:1px; padding:14px;
    border-radius:12px; cursor:pointer; transition:all .3s var(--ease); }
  .sh-btn:active { background:rgba(217,182,103,.16); transform:scale(.97); }
  .sh-btn.on { color:var(--gold2); border-color:var(--gold); background:rgba(217,182,103,.12); }
  #sheet .note { text-align:center; font-size:10px; color:rgba(243,239,230,.4); margin-top:22px; }
  #sheet .close, .menu-close, #cal-close { text-align:center; font-size:12px; letter-spacing:3px;
    color:rgba(243,239,230,.6); margin-top:16px; cursor:pointer; padding:8px; }
  #privacy-link { display:block; text-align:center; margin-top:14px; font-size:10px;
    letter-spacing:1px; color:rgba(217,182,103,.5); text-decoration:none; }

  /* ===== メニュー ===== */
  #menu-sheet { max-width:480px; }
  .menu-item { display:flex; justify-content:space-between; align-items:center; width:100%;
    background:none; border:none; border-bottom:0.5px solid rgba(217,182,103,.12);
    color:var(--paper); font-family:inherit; font-size:16px; letter-spacing:2px; padding:20px 8px;
    cursor:pointer; transition:background .25s; }
  .menu-item:active { background:rgba(217,182,103,.08); }
  .menu-item .m-en { font-size:10px; color:rgba(240,217,138,.5); font-style:italic; letter-spacing:1px; }

  /* ===== 暦（72候）===== */
  #cal-sheet { max-width:560px; }
  #cal-head { text-align:center; font-size:18px; color:var(--gold2); letter-spacing:4px; margin-top:10px; }
  #cal-head span { display:block; font-size:10px; letter-spacing:1px; color:rgba(243,239,230,.5);
    margin-top:4px; font-style:italic; }
  #cal-favbar { text-align:center; font-size:10px; color:rgba(217,182,103,.65); margin:10px 0; min-height:12px; }
  #cal-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:6px; }
  .cal-cell { position:relative; border:0.5px solid rgba(217,182,103,.22); background:rgba(8,8,12,.4);
    color:var(--paper); font-family:inherit; cursor:pointer; padding:12px 4px; text-align:center;
    border-radius:10px; display:flex; flex-direction:column; align-items:center; gap:3px;
    transition:all .25s var(--ease); }
  .cal-cell:active { transform:scale(.95); }
  .cal-cell.cal-today { border-color:var(--shu); }
  .cal-cell.cal-fav { border-color:rgba(217,182,103,.6); }
  .cal-no { font-size:8px; color:rgba(217,182,103,.6); }
  .cal-k { font-size:14px; color:var(--gold3); letter-spacing:1px; }
  .cal-en { font-size:7px; color:rgba(243,239,230,.5); line-height:1.2; font-style:italic; }
  .cal-star { position:absolute; top:4px; right:5px; font-size:9px; color:var(--gold2); }

  /* A2HS */
  #a2hs { position:absolute; left:20px; right:20px; bottom:calc(90px + env(safe-area-inset-bottom)); z-index:30;
    background:rgba(12,12,16,.96); border:0.5px solid rgba(217,182,103,.4); border-radius:14px;
    padding:16px 18px; font-size:12px; line-height:1.7; display:none;
    box-shadow:0 8px 30px rgba(0,0,0,.5); backdrop-filter:blur(10px); }
  #a2hs.on { display:block; }
  #a2hs b { color:var(--gold); }
  #a2hs .x { float:right; color:rgba(243,239,230,.5); cursor:pointer; font-size:14px; }

  /* ===== レスポンシブ ===== */
  @media (max-height:700px), (max-width:380px) {
    #title { top:18%; }
    #title .kanji { font-size:clamp(42px,15vw,58px); }
    #meta { bottom:112px; }
    #more-hint { bottom:90px; }
  }
  @media (min-width:768px) {
    body::before { content:''; position:fixed; inset:0; background:#06060a; z-index:0; }
    #ui, #season-bg, #scene, #season-tint, #goldframe { max-width:600px; left:50%; transform:translateX(-50%); }
    #stage { box-shadow:0 0 80px rgba(0,0,0,.9); }
    #title { top:24%; left:10%; }
    #title .kanji { font-size:clamp(70px,9vw,104px); }
    #title-en { top:24%; left:10.5%; font-size:13px; }
    #meta { left:10.5%; bottom:150px; font-size:14px; }
    #more-hint { left:10.5%; bottom:122px; }
    #cal-grid { grid-template-columns:repeat(4,1fr); }
  }
  @media (orientation:landscape) and (max-height:500px) {
    #title { top:12%; }
    #title .kanji { font-size:clamp(34px,10vh,52px); }
    #meta { bottom:80px; }
    #more-hint { bottom:62px; }
  }
</style>
</head>
<body>
<div id="stage">
  <div id="season-bg"></div>
  <canvas id="scene"></canvas>
  <div id="season-tint"></div>
  <svg id="goldframe" preserveAspectRatio="none"></svg>
  <div id="ui">
    <!-- 上部：候番号のみ（極小・縦） -->
    <div id="ordinal" class="fade"></div>

    <!-- 主役：題字 -->
    <div id="title" class="fade"></div>
    <div id="title-en" class="fade"></div>

    <!-- 季節と日付（一行・控えめ） -->
    <div id="meta" class="fade"></div>

    <!-- 詳細を促す微かなしるし -->
    <div id="more-hint" class="fade">詳しく · tap</div>

    <!-- 下部：進行と最小操作 -->
    <div id="footer">
      <div id="track"><div id="fill"></div></div>
      <div id="dots"></div>
      <div id="controls">
        <button class="ic" id="b-sound" aria-label="音">&#9834;</button>
        <button class="ic" id="b-menu" aria-label="メニュー">&#8230;</button>
      </div>
    </div>

    <!-- 大きな当たり判定：左右送り＆中央タップで詳細 -->
    <div id="tap-detail"></div>

    <div id="a2hs">
      <span class="x" id="a2hs-x">&#10005;</span>
      <b>ホーム画面に追加</b>すると全画面で楽しめます。
    </div>
  </div>

  <!-- 栞（詳細） -->
  <div id="shiori">
    <div id="sheet">
      <div id="sh-head"></div>
      <div id="sh-rule"></div>
      <div id="cols"></div>
      <div id="sh-waka"></div>
      <div id="sh-actions">
        <button class="sh-btn" id="b-fav">&#9734; 栞にはさむ</button>
        <button class="sh-btn" id="b-share">&#10138; この一枚を贈る</button>
      </div>
      <div class="note">音はすべてアプリ内で合成した自然音です</div>
      <div class="close">とじる</div>
      <a id="privacy-link" href="./privacy.html">プライバシー・権利表示</a>
    </div>
  </div>

  <!-- メニュー（操作の集約） -->
  <div id="menu">
    <div id="menu-sheet">
      <button class="menu-item" id="m-today"><span>今日へ戻る</span><span class="m-en">Today</span></button>
      <button class="menu-item" id="m-cal"><span>暦をひらく</span><span class="m-en">Calendar</span></button>
      <button class="menu-item" id="m-lang"><span>English</span><span class="m-en">言語</span></button>
      <div class="menu-close" id="menu-close">とじる</div>
    </div>
  </div>

  <!-- 暦（72候一覧） -->
  <div id="calendar">
    <div id="cal-sheet">
      <div id="cal-head">七十二候<span>The 72 Micro-Seasons</span></div>
      <div id="cal-favbar"></div>
      <div id="cal-grid"></div>
      <div id="cal-close">とじる</div>
    </div>
  </div>
</div>
<div id="err" style="position:fixed;inset:0;background:#0a0a0d;color:#e88;font-size:13px;padding:40px 20px;z-index:9999;display:none;font-family:monospace;line-height:1.7;overflow:auto"></div>
<script>
  window.__err = function(msg){ var e=document.getElementById('err'); e.style.display='block'; e.innerHTML += msg + '<br>'; };
  window.addEventListener('error', function(ev){ window.__err('\u26a0 ' + (ev.message||ev.type)); }, true);
</script>
<script src="koyomi-all.js" onerror="window.__err('\u2715 koyomi-all.js が読めません')"></script>
</body>
</html>
